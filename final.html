<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
</head>
<body>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      width: 320px;
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #e63950;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Thank You 💖</h1>

    <p id="message"></p>

    <button onclick="goHome()">Go Back 🏠</button>
  </div>

  <script>
    const name = localStorage.getItem("username");

    document.getElementById("message").innerText =
      "Hey " + name + " 😊\nYour gift selection has been submitted successfully 🎁";

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

    
</body>
</html>
